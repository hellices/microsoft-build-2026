site_name: Microsoft Build 2026 — Session Notes
site_description: Customer-oriented session notes from Microsoft Build 2026.
site_url: https://hellices.github.io/microsoft-build-2026/
repo_url: https://github.com/hellices/microsoft-build-2026
repo_name: hellices/microsoft-build-2026
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site

theme:
  name: material
  language: ko
  font: false   # disable Google Fonts (Roboto); we self-load Pretendard via extra.css
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/status-chips.js

# nav is intentionally minimal. Session/theme entries will be added as files
# are authored. Until then MkDocs will still pick up new pages in search.
nav:
  - Home: index.md
  - Sessions:
      - Example (BRK000): sessions/BRK000-example-session.md
      - "BRK226 — Inside Azure Innovations": sessions/BRK226-inside-azure-innovations.md
      - "BRK240 — Build context-aware agents": sessions/BRK240-build-context-aware-agents.md
      - "DEM350 — GitHub Agentic Workflows": sessions/DEM350-github-agentic-workflows.md
      - Template: sessions/_TEMPLATE.md
  - Themes:
      - Template: themes/_TEMPLATE.md
  - Contributing: contributing.md
