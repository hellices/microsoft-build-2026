site_name: Microsoft Build 2026 — Session Notes
site_description: Customer-oriented session notes from Microsoft Build 2026.
site_url: https://hellices.github.io/microsoft-build-2026/
repo_url: https://github.com/hellices/microsoft-build-2026
repo_name: hellices/microsoft-build-2026
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: _site

theme:
  name: material
  language: ko
  font: false   # disable Google Fonts (Roboto); we self-load Pretendard via extra.css
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/status-chips.js

# Sidebar groups mirror the categories in docs/index.md.
# Example/Template pages are kept buildable but hidden from nav via not_in_nav.
not_in_nav: |
  sessions/BRK000-example-session.md
  sessions/_TEMPLATE.md
  themes/_TEMPLATE.md

nav:
  - Home: index.md
  - Sessions:
      - Keynote:
          - "KEY01 — Microsoft Build opening keynote": sessions/KEY01-microsoft-build-opening-keynote.md
      - Azure Platform & Infrastructure:
          - "BRK226 — Inside Azure Innovations": sessions/BRK226-inside-azure-innovations.md
      - Agents & Foundry:
          - "BRK240 — Build context-aware agents": sessions/BRK240-build-context-aware-agents.md
          - "BRK243 — Claw & agent harness in Microsoft Foundry": sessions/BRK243-claw-agent-harness-microsoft-foundry.md
          - "BRK246 — Foundry IQ agentic retrieval": sessions/BRK246-foundry-iq-enterprise-knowledge-agentic-retrieval.md
          - "BRK251 — Agent 365 secure enterprise agents": sessions/BRK251-build-secure-enterprise-ready-agents-agent-365.md
          - "DEM330 — Build multimodal agents": sessions/DEM330-build-multimodal-agents-reason-interact-act.md
          - "DEMSP390 — Multimodal AI agents with persistent memory": sessions/DEMSP390-create-multimodal-ai-agents-persistent-memory.md
      - Observability & FinOps for AI:
          - "BRK250 — Observe & control agents (open source)": sessions/BRK250-observe-control-agents-open-source-tools.md
          - "BRK252 — From observability to ROI": sessions/BRK252-observability-to-roi-ai-agents.md
          - "ODSP907 — Monitor GenAI beyond golden signals": sessions/ODSP907-monitor-genai-beyond-golden-signals.md
      - Data Platform:
          - "DEM364 — Azure HorizonDB (PostgreSQL)": sessions/DEM364-horizondb-postgresql.md
          - "DEM368-R1 — Data Science & ML with Microsoft Fabric": sessions/DEM368-R1-data-science-machine-learning-microsoft-fabric.md
          - "LIVE143 — HorizonDB & Rayfin": sessions/LIVE143-azure-data-horizondb-rayfin.md
          - "OD823 — Azure Managed Redis Semantic Caching": sessions/OD823-managed-redis-semantic-caching.md
      - DevOps & Supply Chain:
          - "DEM350 — GitHub Agentic Workflows": sessions/DEM350-github-agentic-workflows.md
          - "ODSP938 — Mitigate GitHub Actions supply chain risks": sessions/ODSP938-mitigate-github-actions-supply-chain.md
  - Themes:
      - "Build 2026 Recap": themes/build-2026-signals.md
  - Contributing: contributing.md
